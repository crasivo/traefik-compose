# ==============================================================================
# Example:       Secure Nginx Web Server Deployment Context
# Description:   Demonstrates how to route and secure a standard Nginx HTTP
#                server backend using the external Traefik middleware chain.
# ------------------------------------------------------------------------------
# Prerequisite:  The global dynamic network 'traefik_public' must be initiated.
# Usage:         docker compose -f docker-compose.nginx.yml up -d
# ==============================================================================

name: example-nginx

services:
  nginx:
    image: docker.io/library/nginx:stable
    restart: unless-stopped
    hostname: nginx
    networks:
      public:
    labels:
      # Explicitly notify Traefik to look after this container asset
      - "traefik.enable=true"
      # Service: Map internal target routing engine to default app port
      - "traefik.http.services.traefik-nginx.loadBalancer.server.port=80"
      # Route: Secure HTTPS entrypoint mapping with dynamic host rule expansion
      - "traefik.http.routers.traefik-nginx.rule=Host(`nginx.${TRAEFIK_PUBLIC_HOST:-traefik.docker}`)"
      - "traefik.http.routers.traefik-nginx.entryPoints=https"
      - "traefik.http.routers.traefik-nginx.tls=true"
      # Security: Enforce hardened middleware stack rules processing
      - "traefik.http.routers.traefik-nginx.service=traefik-nginx"

networks:
  public:
    external: true
    name: "${TRAEFIK_PUBLIC_NETWORK:-traefik_public}"
