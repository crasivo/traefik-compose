# ==============================================================================
# Configuration: Dynamic TLS Options and Certificates Mapping
# Description:   Defines the minimum acceptable TLS version criteria and routes
#                automated wildcards/local certificates generated by OpenSSL
#                bootstrapping scripts to their respective storage layouts.
# ==============================================================================

tls:
  options:
    # Hardened default TLS profile enforcing modern protocol baselines
    default:
      minVersion: VersionTLS12

  # Dynamic certificate store definitions using system layout paths
  certificates:
    - certFile: "/opt/docker/share/openssl/%VIRTUAL_HOST%/certificate_fullchain.pem"
      keyFile: "/opt/docker/share/openssl/%VIRTUAL_HOST%/private_key.pem"

  stores:
    # Failback global certificate store configuration
    default:
      defaultCertificate:
        certFile: "/opt/docker/share/openssl/default/certificate_fullchain.pem"
        keyFile: "/opt/docker/share/openssl/default/private_key.pem"
