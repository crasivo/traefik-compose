name: Build Alpine

on:
  workflow_dispatch:
    inputs:
      traefik_version:
        description: 'Target Traefik version (e.g., 3.0, 3.1.2, latest)'
        required: true
        default: 'latest'
        type: string
      alpine_version:
        description: 'Target Alpine OS version (e.g., 3.20, latest)'
        required: true
        default: 'latest'
        type: string
      is_latest:
        description: 'Mark this build as the "latest" release'
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '0 3 * * 1'

env:
  DOCKERHUB_REPO: docker.io/${{ github.repository_owner }}/traefik
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/traefik

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve Traefik and Alpine versions
        id: resolve_vars
        run: |
          # 1. Обработка версии Traefik
          INPUT_TRAEFIK="${{ inputs.traefik_version }}"
          if [ "$INPUT_TRAEFIK" = "latest" ] || [ -z "$INPUT_TRAEFIK" ]; then
            echo "ℹ️ Fetching the latest stable Traefik version from official GitHub API..."
            LATEST_TAG=$(curl -s https://api.github.com/repos/traefik/traefik/releases/latest | jq -r .tag_name)
            TRAEFIK_VER=$(echo "$LATEST_TAG" | sed 's/^v//')
            IS_LATEST="true"
          else
            TRAEFIK_VER="$INPUT_TRAEFIK"
            IS_LATEST="${{ inputs.is_latest }}"
          fi

          # 2. Обработка версии Alpine через встроенную утилиту skopeo
          INPUT_ALPINE="${{ inputs.alpine_version }}"
          if [ "$INPUT_ALPINE" = "latest" ] || [ -z "$INPUT_ALPINE" ]; then
            echo "ℹ️ Resolving the exact stable Alpine Linux version via skopeo..."

            # Запрашиваем список тегов удаленно, фильтруем только чистые семантические X.Y.Z версии
            EXACT_ALPINE=$(skopeo list-tags docker://docker.io/library/alpine \
              | jq -r '.Tags[]' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1)

            # Безопасный фолбек, если реджистри вернул пустую строку
            if [ -z "$EXACT_ALPINE" ] || [ "$EXACT_ALPINE" = "null" ]; then
              EXACT_ALPINE="3.23"
            fi
            ALPINE_VER="$EXACT_ALPINE"
          else
            ALPINE_VER="$INPUT_ALPINE"
          fi

          # 3. Сборка финального результата
          CURRENT_DATE=$(date +'%Y%m%d')
          echo "✅ Resolved Traefik Version: $TRAEFIK_VER"
          echo "✅ Resolved Alpine Version: $ALPINE_VER"
          echo "✅ Is Latest Release Tag: $IS_LATEST"
          echo "✅ Build Date Tag: $CURRENT_DATE"

          # Экспортируем переменные в env для использования в последующих шагах
          echo "TRAEFIK_FULL_VERSION=$TRAEFIK_VER" >> $GITHUB_ENV
          echo "TRAEFIK_SHORT_VERSION=$(echo "$TRAEFIK_VER" | cut -d'.' -f1-2)" >> $GITHUB_ENV
          echo "ALPINE_FULL_VERSION=$ALPINE_VER" >> $GITHUB_ENV
          echo "ALPINE_SHORT_VERSION=$(echo "$ALPINE_VER" | cut -d'.' -f1-2)" >> $GITHUB_ENV
          echo "MARK_AS_LATEST=$IS_LATEST" >> $GITHUB_ENV
          echo "BUILD_DATE=$CURRENT_DATE" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_REPO }},${{ env.GHCR_REPO }}
          tags: |
            # Traefik
            type=raw,value=${{ env.TRAEFIK_FULL_VERSION }}-alpine${{ env.ALPINE_FULL_VERSION }}
            type=raw,value=${{ env.TRAEFIK_FULL_VERSION }}-alpine${{ env.ALPINE_SHORT_VERSION }}
            type=raw,value=${{ env.TRAEFIK_FULL_VERSION }}-alpine,enable=${{ inputs.alpine_version == 'latest' }}
            type=raw,value=${{ env.TRAEFIK_FULL_VERSION }}-alpine-${{ env.BUILD_DATE }}
            type=raw,value=${{ env.TRAEFIK_FULL_VERSION }}-${{ env.BUILD_DATE }}
            type=raw,value=${{ env.TRAEFIK_FULL_VERSION }},enable=${{ env.MARK_AS_LATEST == 'true' }}
            # Alpine
            type=raw,value=${{ env.TRAEFIK_SHORT_VERSION }}-alpine${{ env.ALPINE_FULL_VERSION }}
            type=raw,value=${{ env.TRAEFIK_SHORT_VERSION }}-alpine${{ env.ALPINE_SHORT_VERSION }}
            type=raw,value=${{ env.TRAEFIK_SHORT_VERSION }}-alpine,enable=${{ inputs.alpine_version == 'latest' }}
            type=raw,value=${{ env.TRAEFIK_SHORT_VERSION }}-alpine-${{ env.BUILD_DATE }}
            type=raw,value=${{ env.TRAEFIK_SHORT_VERSION }}-${{ env.BUILD_DATE }}
            type=raw,value=${{ env.TRAEFIK_SHORT_VERSION }},enable=${{ env.MARK_AS_LATEST == 'true' }}
            # Latest & Alpine
            type=raw,value=alpine,enable=${{ env.MARK_AS_LATEST == 'true' }}
            type=raw,value=latest,enable=${{ env.MARK_AS_LATEST == 'true' }}
          labels: |
            org.opencontainers.image.title=Traefik Hardened Alpine
            org.opencontainers.image.description=Hardened rootless Traefik image built on Alpine Linux with automated local PKI/OpenSSL generation and runtime config macro bootstrapping.
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.version=${{ env.TRAEFIK_FULL_VERSION }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./docker/
          file: ./docker/images/proxy/Dockerfile.alpine
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            TRAEFIK_VERSION=${{ env.TRAEFIK_FULL_VERSION }}
            ALPINE_VERSION=${{ env.ALPINE_FULL_VERSION }}
          tags: |
            ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
