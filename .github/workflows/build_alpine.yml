name: Build and Publish Traefik Alpine

on:
  workflow_dispatch:
    inputs:
      traefik_version:
        description: 'Target Traefik version (e.g., 3.0, 3.1.2, latest)'
        required: true
        default: 'latest'
        type: string
      alpine_version:
        description: 'Target Alpine OS version (e.g., 3.20, latest)'
        required: true
        default: 'latest'
        type: string
      is_latest:
        description: 'Mark this build as the "latest" release'
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '0 3 * * 1'

env:
  DOCKERHUB_REPO: docker.io/${{ github.repository_owner }}/traefik
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/traefik

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve Traefik and Alpine versions
        id: resolve_vars
        run: |
          # 1. Обработка версии Traefik
          INPUT_TRAEFIK="${{ inputs.traefik_version }}"
          if [ "$INPUT_TRAEFIK" = "latest" ] || [ -z "$INPUT_TRAEFIK" ]; then
            echo "ℹ️ Fetching the latest stable Traefik version from official GitHub API..."
            # Получаем tag_name (например, "v3.1.2") и очищаем от префикса "v"
            LATEST_TAG=$(curl -s https://api.github.com/repos/traefik/traefik/releases/latest | jq -r .tag_name)
            TRAEFIK_VER=$(echo "$LATEST_TAG" | sed 's/^v//')
            IS_LATEST="true"
          else
            TRAEFIK_VER="$INPUT_TRAEFIK"
            IS_LATEST="${{ inputs.is_latest }}"
          fi

          # 2. Обработка версии Alpine (для крона ставим по умолчанию latest)
          INPUT_ALPINE="${{ inputs.alpine_version }}"
          if [ -z "$INPUT_ALPINE" ]; then
            ALPINE_VER="latest"
          else
            ALPINE_VER="$INPUT_ALPINE"
          fi

          echo "✅ Resolved Traefik Version: $TRAEFIK_VER"
          echo "✅ Resolved Alpine Version: $ALPINE_VER"
          echo "✅ Is Latest Release Tag: $IS_LATEST"

          # Экспортируем переменные в env для использования в последующих шагах
          echo "TRAEFIK_VERSION=$TRAEFIK_VER" >> $GITHUB_ENV
          echo "ALPINE_VERSION=$ALPINE_VER" >> $GITHUB_ENV
          echo "MARK_AS_LATEST=$IS_LATEST" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.GHCR_REPO }}
          tags: |
            type=raw,value=${{ env.TRAEFIK_VERSION }}-alpine-${{ env.ALPINE_VERSION }}
            type=raw,value=${{ env.TRAEFIK_VERSION }},enable=${{ env.ALPINE_VERSION == 'latest' }}
            type=raw,value=latest,enable=${{ env.MARK_AS_LATEST == 'true' }}
          labels: |
            org.opencontainers.image.title=Traefik Hardened Alpine
            org.opencontainers.image.description=Hardened rootless Traefik image built on Alpine Linux with automated local PKI/OpenSSL generation and runtime config macro bootstrapping.
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.version=${{ env.TRAEFIK_VERSION }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/
          file: ./images/proxy/Dockerfile.alpine
          push: true
          platforms: linux/amd64#,linux/arm64
          build-args: |
            TRAEFIK_VERSION=${{ env.TRAEFIK_VERSION }}
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
